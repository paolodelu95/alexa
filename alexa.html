<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Alexa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="alexa.css">
    <script src="alexa.js" defer></script>
</head>

<header>
    <nav>
        <button type="menu"><i class="fa-solid fa-stopwatch"></i></button>
        <button type="menu"><i class="fas fa-music"></i></button>
        <button type="menu"><i class="fas fa-cog"></i></button>

    </nav>
</header>
<main>
    <h1 id="ora"></h1>
    <p id="data"></p>
    <dialog id="dialog-timer">
        <h2>Timer</h2>
        <p>Imposta un timer</p>
        <div>
            <div class="buttonBar">
            <button type="freccia" hoursUp><i class="fa fa-caret-up"></i></button>
            <button type="freccia" minuteUp><i class="fa fa-caret-up"></i></button>
            <button type="freccia" secondUp><i class="fa fa-caret-up"></i></button>
            </div>
        </div>
        <div>
            <div class="digitsDisplay">
            <h2 id="hour-display">00</h2>
            <h2 id="minute-display">00</h2>
            <h2 id="second-display">00</h2>
            </div>
        </div>
        <div>
            <div class="buttonBar">
            <button type="freccia" hourDown><i class="fa fa-caret-down"></i></button>
            <button type="freccia" minuteDown><i class="fa fa-caret-down"></i></button>
            <button type="freccia" secondDown><i class="fa fa-caret-down"></i></button>
            </div>
        </div>
        <div id="timer-display">00:00</div >
        <button onclick="document.getElementById('dialog-timer').close()">Chiudi</button>
    </dialog>
    <dialog id="dialog-musica">
        <h2>Musica</h2>
        <p>Visualizza le informazioni sulla musica.</p>
        <button onclick="document.getElementById('dialog-musica').close()">Chiudi</button>
    </dialog>
    <dialog id="dialog-impostazioni">
        <h2>Impostazioni</h2>
        <p>Gestisci le impostazioni dell'app.</p>
        <button onclick="document.getElementById('dialog-impostazioni').close()">Chiudi</button>
    </dialog>
</main>
<div id="bg"></div>
</html>
